name: endless
description: Notes, Tasks, Reminders, Alarms & Money Manager — one app for Gen-Z
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Alarms & Notifications
  alarm: ^4.0.2
  flutter_local_notifications: ^17.2.2
  permission_handler: ^11.3.1
  timezone: ^0.9.4

  # Navigation
  go_router: ^14.2.0

  # Charts
  fl_chart: ^0.68.0

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # UI Components
  flutter_slidable: ^3.1.1
  drag_and_drop_lists: ^0.4.2
  glassmorphism: ^3.0.0

  # Typography & Icons
  google_fonts: ^6.2.1
  iconsax: ^0.0.8

  # Security
  local_auth: ^2.2.0

  # Date & Number Formatting
  intl: ^0.19.0

  # Utilities
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  uuid: ^4.4.2
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
